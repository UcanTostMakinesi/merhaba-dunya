<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TostMakinesi Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #eff6ff; }
        .game-card { transition: transform 0.2s ease; }
        .game-card:hover { transform: translateY(-5px); }
        .hidden { display: none; }
    </style>
</head>
<body class="font-sans text-blue-900">

    <header class="p-6 bg-blue-600 shadow-lg text-white flex justify-between items-center">
        <h1 class="text-3xl font-extrabold tracking-tight">TostMakinesi Games</h1>
        <button onclick="openAdmin()" class="bg-blue-900 px-4 py-2 rounded-full font-bold hover:bg-black transition-all">
            Yönetici Paneli
        </button>
    </header>

    <main class="max-w-6xl mx-auto p-6">
        <div id="gameGrid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- Oyunlar burada listelenecek -->
        </div>
    </main>

    <div id="adminModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-2xl">
            <h2 id="modalTitle" class="text-2xl font-bold mb-4">Yönetici Girişi</h2>
            
            <div id="loginArea">
                <input type="password" id="passwordInput" placeholder="Şifre" class="w-full p-3 border rounded-lg mb-4">
                <button onclick="checkPassword()" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold">Giriş Yap</button>
            </div>

            <div id="uploadForm" class="hidden space-y-4">
                <input type="text" id="gameName" placeholder="Oyun Adı" class="w-full p-3 border rounded-lg">
                <label class="block text-sm text-gray-500">HTML Oyun Dosyası:</label>
                <input type="file" id="gameFile" accept=".html" class="w-full p-2 border rounded-lg">
                <button onclick="addGame()" class="w-full bg-green-600 text-white p-3 rounded-lg font-bold">Oyunu Ekle</button>
                
                <hr class="my-2">
                <div class="flex gap-2">
                    <button onclick="exportGames()" class="flex-1 bg-yellow-500 text-white p-2 rounded-lg font-bold text-sm">Yedekle (Dışa Aktar)</button>
                    <label class="flex-1 bg-purple-500 text-white p-2 rounded-lg font-bold text-sm text-center cursor-pointer">
                        Yükle (İçe Aktar)
                        <input type="file" id="importFile" accept=".json" class="hidden" onchange="importGames(event)">
                    </label>
                </div>
            </div>
            <button onclick="closeModal()" class="w-full mt-4 text-gray-500 hover:text-red-500 font-bold">Kapat</button>
            <p id="msg" class="mt-2 text-center text-sm font-bold"></p>
        </div>
    </div>

    <script>
        let games = JSON.parse(localStorage.getItem('myGames')) || [];

        function renderGames() {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = games.length === 0 ? 
                '<p class="col-span-full text-center text-xl mt-10 text-blue-500 font-bold">Henüz oyun yüklenmemiş. Yönetici panelinden ekleyebilirsin!</p>' : '';
            
            games.forEach((game, index) => {
                grid.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-md game-card border-l-4 border-blue-500">
                        <h3 class="font-bold text-lg mb-3 truncate">${game.name}</h3>
                        <button onclick="playGame(${index})" class="w-full bg-blue-500 text-white py-2 rounded-lg font-bold hover:bg-blue-700 transition">Oyna</button>
                    </div>
                `;
            });
        }

        function checkPassword() {
            const pass = document.getElementById('passwordInput').value;
            if(pass === "Kafiye.5876.") {
                document.getElementById('uploadForm').classList.remove('hidden');
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('modalTitle').innerText = "Oyun Paneli";
            } else {
                showMessage("Hatalı şifre!", "red");
            }
        }

        function addGame() {
            const name = document.getElementById('gameName').value;
            const fileInput = document.getElementById('gameFile');
            
            if(name && fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const reader = new FileReader();
                reader.onload = function(e) {
                    games.push({name: name, content: e.target.result});
                    localStorage.setItem('myGames', JSON.stringify(games));
                    renderGames();
                    showMessage("Oyun başarıyla eklendi!", "green");
                    document.getElementById('gameName').value = '';
                    document.getElementById('gameFile').value = '';
                };
                reader.readAsText(file);
            } else {
                showMessage("Lütfen isim ve dosya seçin.", "red");
            }
        }

        function exportGames() {
            const data = JSON.stringify(games);
            const blob = new Blob([data], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'oyunlarim_yedek.json';
            a.click();
            showMessage("Yedek dosyası indirildi!", "green");
        }

        function importGames(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    games = imported;
                    localStorage.setItem('myGames', JSON.stringify(games));
                    renderGames();
                    showMessage("Oyunlar başarıyla geri yüklendi!", "green");
                } catch(err) {
                    showMessage("Hatalı yedek dosyası!", "red");
                }
            };
            reader.readAsText(file);
        }

        function playGame(index) {
            const game = games[index];
            const win = window.open("", "_blank", "width=800,height=600");
            win.document.write(game.content);
        }

        function showMessage(text, color) {
            const m = document.getElementById('msg');
            m.innerText = text;
            m.className = `mt-2 text-center text-sm font-bold text-${color}-500`;
        }

        function openAdmin() { document.getElementById('adminModal').classList.remove('hidden'); }
        function closeModal() { 
            document.getElementById('adminModal').classList.add('hidden'); 
            document.getElementById('uploadForm').classList.add('hidden');
            document.getElementById('loginArea').classList.remove('hidden');
            document.getElementById('modalTitle').innerText = "Yönetici Girişi";
            document.getElementById('passwordInput').value = '';
            document.getElementById('msg').innerText = '';
        }

        window.onload = renderGames;
    </script>
</body>
</html>
